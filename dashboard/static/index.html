<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TradeBot Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="top-bar">
    <h1>TradeBot Local Dashboard</h1>
    <p class="meta" id="meta-line">Loading…</p>
  </header>

  <nav class="tabs" role="tablist">
    <button type="button" class="tab active" data-tab="tradebot" role="tab">TradeBot</button>
    <button type="button" class="tab" data-tab="watchdog" role="tab">WatchDog</button>
    <button type="button" class="tab" data-tab="auditor" role="tab">Auditor</button>
  </nav>

  <main>
    <section id="panel-tradebot" class="panel active" role="tabpanel"></section>
    <section id="panel-watchdog" class="panel" role="tabpanel" hidden></section>
    <section id="panel-auditor" class="panel" role="tabpanel" hidden></section>
  </main>

  <aside class="sidebar" id="backlog-sidebar">
    <h2>Backlog</h2>
    <ul id="backlog-list"></ul>
  </aside>

  <script src="/static/app.js"></script>
</body>
</html>
